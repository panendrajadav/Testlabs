llm:
  provider: azure  # azure, openai, or anthropic
  model: gpt-4o
  temperature: 0.3
  azure_endpoint: https://panendrajadav-1606-resource.services.ai.azure.com/models/chat/completions
  api_version: 2024-05-01-preview

automl:
  max_iterations: 3
  score_threshold: 0.85
  task_type: auto  # auto, classification, regression
  cv_folds: 3

models:
  - logistic_regression
  - random_forest
  - xgboost
  - lightgbm
  - svm
  - decision_tree
  - knn
  - ridge
  - lasso

optuna:
  n_trials: 15
  direction: maximize  # maximize for classification, minimize for regression
